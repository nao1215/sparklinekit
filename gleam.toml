name = "sparklinekit"
version = "0.1.0"
description = "Sparkline generator for Gleam — Unicode block output for terminals and SVG output for the browser. Dependency-free, runs on Erlang and JavaScript."
licences = ["MIT"]
repository = { type = "github", user = "nao1215", repo = "sparklinekit" }
links = [
  { title = "Repository", href = "https://github.com/nao1215/sparklinekit" },
  { title = "Changelog", href = "https://github.com/nao1215/sparklinekit/blob/main/CHANGELOG.md" },
]
gleam = ">= 1.15.0"

[dependencies]
gleam_stdlib = ">= 0.44.0 and < 2.0.0"

[dev-dependencies]
gleeunit = ">= 1.0.0 and < 2.0.0"
glinter = ">= 2.14.0 and < 3.0.0"
simplifile = ">= 2.4.0 and < 3.0.0"

[tools.glinter]
warnings_as_errors = true
include = ["src/", "test/"]

[tools.glinter.rules]
label_possible = "off"
prefer_guard_clause = "off"
short_variable_name = "off"
unused_exports = "off"

[tools.glinter.ignore]
"test/**/*.gleam" = [
  "assert_ok_pattern",
  "missing_type_annotation",
  "short_variable_name",
  "unused_exports",
]
